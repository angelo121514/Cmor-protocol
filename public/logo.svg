<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440" width="400" height="440">
  <!-- CMOR Protocol Logo - uses currentColor for dark/light mode compatibility -->
  <defs>
    <style>
      .logo-element { fill: currentColor; }
      .logo-stroke-element { stroke: currentColor; fill: none; }
    </style>
  </defs>

  <!-- C icon - three layered curves with connection nodes -->
  <g transform="translate(200, 155)">
    <!-- Outer C curve -->
    <path class="logo-stroke-element" d="M 45,-125 C 105,-125 145,-75 145,-10 C 145,55 105,105 45,125" 
          stroke-width="22" stroke-linecap="round"/>
    <!-- Middle C curve -->
    <path class="logo-stroke-element" d="M 20,-95 C 65,-95 95,-55 95,-5 C 95,45 65,80 20,95" 
          stroke-width="18" stroke-linecap="round"/>
    <!-- Inner C curve -->
    <path class="logo-stroke-element" d="M -5,-65 C 30,-65 50,-35 50,-5 C 50,25 30,55 -5,65" 
          stroke-width="14" stroke-linecap="round"/>

    <!-- Connection nodes (dots) -->
    <circle class="logo-element" cx="45" cy="-125" r="12"/>
    <circle class="logo-element" cx="20" cy="-95" r="10"/>
    <circle class="logo-element" cx="-5" cy="-65" r="8"/>
    <circle class="logo-element" cx="45" cy="125" r="12"/>
    <circle class="logo-element" cx="20" cy="95" r="10"/>
    <circle class="logo-element" cx="-5" cy="65" r="8"/>
  </g>

  <!-- CMOR text -->
  <text x="200" y="330" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" 
        font-size="72" font-weight="900" text-anchor="middle" letter-spacing="-2" class="logo-element">CMOR</text>

  <!-- PROTOCOL text -->
  <text x="200" y="370" font-family="'Arial', 'Helvetica Neue', sans-serif" 
        font-size="28" font-weight="400" text-anchor="middle" letter-spacing="6" class="logo-element">PROTOCOL</text>
</svg>